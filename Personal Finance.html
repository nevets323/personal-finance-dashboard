function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {
  return <div className="twk-sect">{label}</div>;
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

// ── data ─────────────────────────────────────────────────────────────────────

const TODAY = new Date();
const CURRENT_MONTH = `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}`;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Bill template — names, due days and categories only. All amounts start at $0.
// Use the edit button on any bill to enter your actual amounts.
const BILL_SEED = [

  { name: 'eBay Card',    dueDay: 17, category: 'Credit'    },

const DEFAULT_BILLS = BILL_SEED.map((s, i) => ({
  id: `bill_${i}`, name: s.name, dueDay: s.dueDay, category: s.category,
  history: {},
}));

// No debts pre-loaded — add your own via "+ Add debt"
const DEFAULT_DEBTS = [];

const LS_KEY = 'pf_app_state_v2';

// Load from server; fall back to localStorage if server unreachable
async function loadStateAsync() {
  try {
    const res = await fetch('/api/state');
    if (res.ok) { const d = await res.json(); if (d) return d; }
  } catch (e) {}
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return null; }
}

// Write to localStorage immediately, then sync to server
async function saveStateAsync(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {}
  try {
    await fetch('/api/state', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(s),
    });
  } catch (e) {}
}

function useAppState() {
  const [ready, setReady] = React.useState(false);
  const [bills, setBills] = React.useState(DEFAULT_BILLS);
  const [debts, setDebts] = React.useState(DEFAULT_DEBTS);

  // Load from server (or localStorage fallback) once on mount
  React.useEffect(() => {
    loadStateAsync().then(persisted => {
      if (persisted?.bills) setBills(persisted.bills);
      if (persisted?.debts) setDebts(persisted.debts);
      setReady(true);
    });
  }, []);

  // Persist whenever state changes, but not before the initial load completes
  React.useEffect(() => {
    if (!ready) return;
    saveStateAsync({ bills, debts });
  }, [bills, debts, ready]);

  const setBillStatus = (billId, month, status) => {
    setBills(prev => prev.map(b => {
      if (b.id !== billId) return b;
      const h = { ...b.history };
      h[month] = { ...(h[month] || { amount: 0 }), status };
      return { ...b, history: h };
    }));
  };
  const setBillAmount = (billId, month, amount) => {
    setBills(prev => prev.map(b => {
      if (b.id !== billId) return b;
      const h = { ...b.history };
      h[month] = { ...(h[month] || { status: 'unpaid' }), amount };
      return { ...b, history: h };
    }));
  };
  const addBill = (bill) => {
    const id = `bill_${Date.now()}`;
    setBills(prev => [...prev, { id, history: {}, ...bill }]);
  };
  const removeBill = (id) => setBills(prev => prev.filter(b => b.id !== id));
  const updateBill = (id, patch) => {
    setBills(prev => prev.map(b => {
      if (b.id !== id) return b;
      const next = { ...b, ...patch };
      if (patch.expectedAmount !== undefined) {
        const h = { ...b.history };
        Object.keys(h).forEach(mk => {
          if (mk > CURRENT_MONTH && h[mk]?.projected) h[mk] = { ...h[mk], amount: patch.expectedAmount };
        });
        next.history = h;
        delete next.expectedAmount;
      }
      return next;
    }));
  };
  const addDebt = (debt) => {
    const id = `debt_${Date.now()}`;
    const today = TODAY.toISOString().slice(0,10);
    setDebts(prev => [...prev, { id, history: [{ date: today, balance: debt.balance }], ...debt }]);
  };
  const removeDebt = (id) => setDebts(prev => prev.filter(d => d.id !== id));
  const updateDebt = (id, patch) => {
    setDebts(prev => prev.map(d => {
      if (d.id !== id) return d;
      const next = { ...d, ...patch };
      if (patch.balance !== undefined && patch.balance !== d.balance) {
        const today = TODAY.toISOString().slice(0,10);
        const filtered = (d.history || []).filter(h => h.date !== today);
        next.history = [...filtered, { date: today, balance: patch.balance }]
          .sort((a,b) => a.date.localeCompare(b.date));
      }
      return next;
    }));
  };
  const resetData = () => { setBills(DEFAULT_BILLS); setDebts(DEFAULT_DEBTS); };

  return { bills, debts, ready, setBillStatus, setBillAmount, addBill, removeBill, updateBill, addDebt, removeDebt, updateDebt, resetData };
}

function fmtMoney(n, opts = {}) {
  if (n == null || isNaN(n)) return '—';
  const { compact = false, sign = false } = opts;
  if (compact && Math.abs(n) >= 1000) return (sign && n > 0 ? '+' : '') + '$' + (n/1000).toFixed(1) + 'k';
  return (sign && n > 0 ? '+' : '') + '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function monthKey(year, monthIdx) { return `${year}-${String(monthIdx+1).padStart(2,'0')}`; }
function billsForMonth(bills, mk) {
  return bills.map(b => ({ bill: b, entry: b.history[mk] })).filter(x => x.entry && x.entry.amount > 0);
}
function ytdPaid(bill, year = 2026) {
  let total = 0;
  for (let m = 1; m <= 12; m++) {
    const key = `${year}-${String(m).padStart(2,'0')}`;
    const e = bill.history[key];
    if (e && e.status === 'paid') total += e.amount;
  }
  return total;
}
function avgMonthly(bill) {
  const known = Object.values(bill.history).filter(e => !e.projected && e.amount > 0);
  if (!known.length) return 0;
  return known.reduce((s,e)=>s+e.amount, 0) / known.length;
}

function Sparkline({ values, width = 80, height = 22, stroke = 'var(--accent)', fill = 'rgba(var(--accent-rgb),.12)' }) {
  if (!values || values.length < 2) return <svg width={width} height={height} />;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = width / (values.length - 1);
  const pts = values.map((v, i) => [i * stepX, height - 2 - ((v - min) / range) * (height - 4)]);
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ` L${width},${height} L0,${height} Z`;
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <path d={area} fill={fill} />
      <path d={path} fill="none" stroke={stroke} strokeWidth={1.25} strokeLinejoin="round" strokeLinecap="round" />
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={2} fill={stroke}/>
    </svg>
  );
}

const btnLinkStyle = { appearance:'none', border:0, background:'transparent', color:'var(--muted)', fontSize:11.5, cursor:'pointer', padding:0, fontFamily:'inherit' };

function Dashboard({ state, onNav }) {
  const { bills, debts } = state;
  const cm = CURRENT_MONTH;
  const nextMonth = '2026-06';

  const thisMonthBills = billsForMonth(bills, cm);
  const thisMonthTotal = thisMonthBills.reduce((s,b)=>s+b.entry.amount, 0);
  const thisMonthPaid  = thisMonthBills.filter(b=>b.entry.status==='paid').reduce((s,b)=>s+b.entry.amount,0);
  const thisMonthProc  = thisMonthBills.filter(b=>b.entry.status==='processing').reduce((s,b)=>s+b.entry.amount,0);
  const thisMonthUnpaid= thisMonthBills.filter(b=>b.entry.status==='unpaid').reduce((s,b)=>s+b.entry.amount,0);
  const paidCount = thisMonthBills.filter(b=>b.entry.status==='paid').length;
  const totalCount = thisMonthBills.length;

  const today = TODAY;
  const upcoming = [];
  bills.forEach(b => {
    [cm, nextMonth].forEach(mk => {
      const e = b.history[mk];
      if (!e) return;
      const [y,m] = mk.split('-').map(Number);
      const due = new Date(y, m-1, b.dueDay);
      const daysDiff = Math.round((due - today) / 86400000);
      if (daysDiff >= -2 && daysDiff <= 21 && e.status !== 'paid') {
        upcoming.push({ bill: b, entry: e, due, daysDiff, month: mk });
      }
    });
  });
  upcoming.sort((a,b)=>a.due-b.due);

  const ytdTotal = bills.reduce((s,b)=>s+ytdPaid(b), 0);
  const totalDebt = debts.reduce((s,d)=>s+d.balance, 0);
  const minPayments = debts.reduce((s,d)=>s+(d.minPayment||0), 0);
  let oldestTotal = 0;
  debts.forEach(d => { oldestTotal += d.history?.length ? d.history[0].balance : d.balance; });
  const debtChange = totalDebt - oldestTotal;

  const monthlyTotals = MONTHS.map((_, i) => {
    const key = `2026-${String(i+1).padStart(2,'0')}`;
    return bills.reduce((s,b) => {
      const e = b.history[key];
      return s + (e && e.amount && !e.projected ? e.amount : 0);
    }, 0);
  });

  const stats = [
    {
      label: 'This month', value: fmtMoney(thisMonthTotal),
      sub: `${paidCount}/${totalCount} bills paid`,
      bar: { paid: thisMonthPaid, processing: thisMonthProc, unpaid: thisMonthUnpaid, total: thisMonthTotal },
    },
    {
      label: 'Outstanding', value: fmtMoney(thisMonthUnpaid + thisMonthProc),
      sub: thisMonthUnpaid > 0
        ? `${fmtMoney(thisMonthUnpaid)} unpaid · ${fmtMoney(thisMonthProc)} processing`
        : thisMonthProc > 0 ? `${fmtMoney(thisMonthProc)} processing` : 'All cleared',
      tone: thisMonthUnpaid > 0 ? 'red' : thisMonthProc > 0 ? 'amber' : 'green',
    },
    { label: 'YTD paid', value: fmtMoney(ytdTotal), sub: `Across ${bills.length} bills` },
    {
      label: 'Total debt', value: fmtMoney(totalDebt),
      sub: `${debtChange < 0 ? '↓' : '↑'} ${fmtMoney(Math.abs(debtChange), { compact: true })} since Jan · min ${fmtMoney(minPayments, { compact: true })}/mo`,
      tone: debtChange < 0 ? 'green' : 'red',
    },
  ];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {stats.map((s, i) => (
          <Card key={i} style={{ padding: 16 }}>
            <div style={{ fontSize: 11, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '.05em', fontWeight: 500 }}>{s.label}</div>
            <div style={{
              fontFamily: 'var(--mono)', fontSize: 24, fontWeight: 500, marginTop: 6,
              letterSpacing: '-.015em', fontVariantNumeric: 'tabular-nums',
              color: s.tone === 'red' ? '#f87171' : s.tone === 'amber' ? '#fbbf24' : s.tone === 'green' ? '#4ade80' : 'var(--fg)',
            }}>{s.value}</div>
            <div style={{ fontSize: 11.5, color: 'var(--muted)', marginTop: 4 }}>{s.sub}</div>
            {s.bar && s.bar.total > 0 && (
              <div style={{ display:'flex', gap:2, marginTop:12, height:4, borderRadius:2, overflow:'hidden', background:'var(--border)' }}>
                <div style={{ width:`${(s.bar.paid/s.bar.total)*100}%`, background:'#22c55e' }}/>
                <div style={{ width:`${(s.bar.processing/s.bar.total)*100}%`, background:'#f59e0b' }}/>
                <div style={{ width:`${(s.bar.unpaid/s.bar.total)*100}%`, background:'#ef4444' }}/>
              </div>
            )}
          </Card>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 12 }}>
        <Card padded={false}>
          <div style={{ padding: '14px 16px 6px' }}>
            <SectionTitle hint={`${upcoming.length} due in next 21 days`}
              right={<button onClick={() => onNav('bills')} style={btnLinkStyle}>View all →</button>}>
              Upcoming
            </SectionTitle>
          </div>
          <div>
            {upcoming.length === 0 && (
              <div style={{ padding: 24, fontSize: 12, color: 'var(--muted)', textAlign: 'center' }}>Nothing due in the next three weeks.</div>
            )}
            {upcoming.slice(0, 8).map((u, i) => {
              const tone = u.daysDiff < 0 ? 'red' : u.daysDiff <= 3 ? 'amber' : 'default';
              return (
                <div key={i} style={{ display:'grid', gridTemplateColumns:'48px 1fr auto auto', alignItems:'center', gap:12, padding:'8px 16px', borderTop:'1px solid var(--border)' }}>
                  <div style={{ fontFamily:'var(--mono)', fontSize:11, color:'var(--muted)', textAlign:'center', lineHeight:1.15 }}>
                    <div style={{ fontSize:9, textTransform:'uppercase', letterSpacing:'.08em' }}>{MONTHS[u.due.getMonth()]}</div>
                    <div style={{ fontSize:17, fontWeight:500, color: tone==='red'?'#f87171':tone==='amber'?'#fbbf24':'var(--fg)' }}>{u.due.getDate()}</div>
                  </div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:500 }}><CategoryDot category={u.bill.category}/>{u.bill.name}</div>
                    <div style={{ fontSize:11, color:'var(--muted)', marginTop:1 }}>
                      {u.daysDiff < 0 ? `${-u.daysDiff}d overdue` : u.daysDiff === 0 ? 'Due today' : u.daysDiff === 1 ? 'Tomorrow' : `In ${u.daysDiff} days`} · {u.bill.category}
                    </div>
                  </div>
                  <div style={{ fontFamily:'var(--mono)', fontSize:13, fontVariantNumeric:'tabular-nums' }}>{fmtMoney(u.entry.amount)}</div>
                  <StatusPill status={u.entry.status} onChange={(s) => state.setBillStatus(u.bill.id, u.month, s)} size="xs"/>
                </div>
              );
            })}
          </div>
        </Card>

        <Card padded={false}>
          <div style={{ padding: '14px 16px 6px' }}>
            <SectionTitle hint={`${debts.length} accounts`}
              right={<button onClick={() => onNav('debt')} style={btnLinkStyle}>Manage →</button>}>
              Debt
            </SectionTitle>
          </div>
          <div>
            {[...debts].sort((a,b)=>b.balance-a.balance).slice(0,6).map(d => {
              const pct = totalDebt ? (d.balance/totalDebt)*100 : 0;
              return (
                <div key={d.id} style={{ padding:'8px 16px', borderTop:'1px solid var(--border)' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', gap:8 }}>
                    <div style={{ fontSize:12.5, fontWeight:500 }}><CategoryDot category={d.category}/>{d.name}</div>
                    <div style={{ fontFamily:'var(--mono)', fontSize:12.5, fontVariantNumeric:'tabular-nums' }}>{fmtMoney(d.balance)}</div>
                  </div>
                  <div style={{ height:3, background:'var(--border)', borderRadius:2, marginTop:6, overflow:'hidden' }}>
                    <div style={{ height:'100%', width:`${pct}%`, background:'var(--accent)' }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      <Card>
        <SectionTitle hint="Total bills · 2026">Monthly trend</SectionTitle>
        <MonthlyTrendChart values={monthlyTotals} />
      </Card>
    </div>
  );
}

function BillsView({ state, density, hidePaid }) {
  const { bills } = state;
  const [viewMonth, setViewMonth] = React.useState(CURRENT_MONTH);
  const [openBillId, setOpenBillId] = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);

  let rows = bills.map(b => ({ bill: b, entry: b.history[viewMonth] || { amount: 0, status: 'unpaid' } }));
  rows = rows.sort((a,b) => a.bill.dueDay - b.bill.dueDay);
  if (hidePaid) rows = rows.filter(r => r.entry.status !== 'paid');

  const total = rows.reduce((s,r)=>s+r.entry.amount,0);
  const paid  = rows.filter(r=>r.entry.status==='paid').reduce((s,r)=>s+r.entry.amount,0);

  const MIN_YEAR = TODAY.getFullYear() - 1, MAX_YEAR = TODAY.getFullYear() + 10;
  const viewYr  = parseInt(viewMonth.slice(0, 4));
  const viewMIdx = parseInt(viewMonth.slice(5, 7)) - 1;
  const setYear  = (y) => setViewMonth(`${y}-${String(viewMIdx + 1).padStart(2,'0')}`);
  const setMIdx  = (m) => setViewMonth(`${viewYr}-${String(m + 1).padStart(2,'0')}`);

  const rowPad = density === 'compact' ? '6px 14px' : density === 'comfy' ? '14px 14px' : '10px 14px';

  const navBtnStyle = {
    appearance:'none', border:'1px solid var(--border)', background:'var(--panel-2)',
    color:'var(--fg-dim)', width:24, height:24, borderRadius:6, display:'inline-flex',
    alignItems:'center', justifyContent:'center', cursor:'pointer', padding:0, fontSize:13, fontFamily:'inherit',
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      {/* Year + month picker */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:12, flexWrap:'wrap' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, flexWrap:'wrap' }}>
          {/* Year nav */}
          <div style={{ display:'flex', alignItems:'center', gap:4 }}>
            <button style={navBtnStyle} disabled={viewYr <= MIN_YEAR}
              onClick={() => setYear(viewYr - 1)}
              onMouseEnter={e=>{ if(viewYr > MIN_YEAR) e.currentTarget.style.background='var(--hover)'; }}
              onMouseLeave={e=>e.currentTarget.style.background='var(--panel-2)'}>‹</button>
            <div style={{ fontFamily:'var(--mono)', fontSize:13, fontWeight:600, minWidth:36, textAlign:'center', letterSpacing:'-.01em' }}>{viewYr}</div>
            <button style={navBtnStyle} disabled={viewYr >= MAX_YEAR}
              onClick={() => setYear(viewYr + 1)}
              onMouseEnter={e=>{ if(viewYr < MAX_YEAR) e.currentTarget.style.background='var(--hover)'; }}
              onMouseLeave={e=>e.currentTarget.style.background='var(--panel-2)'}>›</button>
          </div>
          {/* Month chips */}
          <div style={{ display:'flex', gap:3 }}>
            {MONTHS.map((m, i) => {
              const active = i === viewMIdx;
              return (
                <button key={m} onClick={() => setMIdx(i)} style={{
                  appearance:'none', border: active ? '1px solid var(--accent)' : '1px solid var(--border)',
                  background: active ? 'rgba(var(--accent-rgb),.15)' : 'var(--panel-2)',
                  color: active ? 'var(--accent)' : 'var(--muted)',
                  fontFamily:'inherit', fontWeight: active ? 600 : 400,
                  fontSize:11.5, padding:'4px 8px', borderRadius:6, cursor:'pointer',
                  letterSpacing:'.01em',
                }}
                onMouseEnter={e=>{ if(!active){ e.currentTarget.style.background='var(--hover)'; e.currentTarget.style.color='var(--fg)'; }}}
                onMouseLeave={e=>{ if(!active){ e.currentTarget.style.background='var(--panel-2)'; e.currentTarget.style.color='var(--muted)'; }}}>
                  {m}
                </button>
              );
            })}
          </div>
          <div style={{ fontSize:11.5, color:'var(--muted)' }}>
            <span style={{ fontFamily:'var(--mono)', color:'var(--fg)' }}>{fmtMoney(paid)}</span> of <span style={{ fontFamily:'var(--mono)' }}>{fmtMoney(total)}</span> paid
          </div>
        </div>
        <Btn small onClick={()=>setShowAdd(true)}>+ Add bill</Btn>
      </div>

      <Card padded={false}>
        <div style={{ display:'grid', gridTemplateColumns:'52px 1.4fr 1fr 1fr 100px 84px 70px', padding:'10px 14px', borderBottom:'1px solid var(--border)', fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', fontWeight:500 }}>
          <div>Due</div><div>Bill</div><div>Category</div><div>Status</div>
          <div style={{ textAlign:'right' }}>Amount</div>
          <div style={{ textAlign:'right' }}>YTD paid</div>
          <div/>
        </div>
        {rows.length === 0 && (
          <div style={{ padding:32, textAlign:'center', fontSize:12, color:'var(--muted)' }}>
            {hidePaid ? 'All bills paid for this month.' : 'No bills for this month yet.'}
          </div>
        )}
        {rows.map((r, idx) => {
          const ytd = ytdPaid(r.bill);
          const expanded = openBillId === r.bill.id;
          return (
            <div key={r.bill.id} style={{ borderTop: idx > 0 ? '1px solid var(--border)' : 'none' }}>
              <div style={{ display:'grid', gridTemplateColumns:'52px 1.4fr 1fr 1fr 100px 84px 70px', padding:rowPad, alignItems:'center', cursor:'pointer', background: expanded ? 'var(--hover)' : 'transparent' }}
                onClick={() => setOpenBillId(expanded ? null : r.bill.id)}
                onMouseEnter={e=>{ if(!expanded) e.currentTarget.style.background='var(--hover-soft)'; }}
                onMouseLeave={e=>{ if(!expanded) e.currentTarget.style.background='transparent'; }}>
                <div style={{ fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)', fontVariantNumeric:'tabular-nums' }}>{String(r.bill.dueDay).padStart(2,'0')}</div>
                <div style={{ fontSize:13, fontWeight:500 }}><CategoryDot category={r.bill.category}/>{r.bill.name}</div>
                <div style={{ fontSize:12, color:'var(--muted)' }}>{r.bill.category}</div>
                <div onClick={e=>e.stopPropagation()}>
                  <StatusPill status={r.entry.status} onChange={(s)=>state.setBillStatus(r.bill.id, viewMonth, s)}/>
                </div>
                <div style={{ textAlign:'right', fontFamily:'var(--mono)', fontSize:13, fontVariantNumeric:'tabular-nums' }}>{fmtMoney(r.entry.amount)}</div>
                <div style={{ textAlign:'right', fontFamily:'var(--mono)', fontSize:12, color:'var(--muted)', fontVariantNumeric:'tabular-nums' }}>{fmtMoney(ytd, { compact:true })}</div>
                <div style={{ display:'flex', justifyContent:'flex-end', gap:4, alignItems:'center' }} onClick={e=>e.stopPropagation()}>
                  <IconBtn title="Edit bill" onClick={()=>setEditingId(r.bill.id)}>
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11 2.5l2.5 2.5L5 13.5H2.5V11L11 2.5z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg>
                  </IconBtn>
                  <IconBtn title="Delete bill" danger onClick={()=>{ if(confirm(`Delete "${r.bill.name}"?`)) state.removeBill(r.bill.id); }}>
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4V2.5h3V4M5 4.5l.5 9h5l.5-9M7 7v4M9 7v4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </IconBtn>
                </div>
              </div>
              {expanded && (
                <div style={{ padding:'6px 14px 16px', background:'var(--hover)', borderTop:'1px solid var(--border)' }}>
                  <BillDetail bill={r.bill} state={state}/>
                </div>
              )}
            </div>
          );
        })}
      </Card>

      {showAdd && <AddBillModal onClose={()=>setShowAdd(false)} state={state}/>}
      {editingId && <EditBillModal onClose={()=>setEditingId(null)} state={state} bill={bills.find(b=>b.id===editingId)} viewMonth={viewMonth}/>}
    </div>
  );
}

function BillDetail({ bill, state }) {
  const monthly = MONTHS.map((m, i) => {
    const key = `2026-${String(i+1).padStart(2,'0')}`;
    return { month: m, key, entry: bill.history[key] };
  });
  const knownVals = monthly.filter(m => m.entry && !m.entry.projected).map(m=>m.entry.amount);
  const avg = knownVals.length ? knownVals.reduce((s,v)=>s+v,0)/knownVals.length : 0;
  const total = ytdPaid(bill);
  const max = Math.max(...monthly.map(m => m.entry?.amount || 0), 1);

  return (
    <div style={{ padding:'12px 8px 4px' }}>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:10, marginBottom:14 }}>
        {[
          { label:'Avg / month', value: fmtMoney(avg) },
          { label:'YTD paid',    value: fmtMoney(total) },
          { label:'Highest',     value: fmtMoney(Math.max(...knownVals, 0)) },
          { label:'Lowest',      value: fmtMoney(Math.min(...knownVals.filter(v=>v>0), Infinity) === Infinity ? 0 : Math.min(...knownVals.filter(v=>v>0))) },
        ].map(s => (
          <div key={s.label}>
            <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em' }}>{s.label}</div>
            <div style={{ fontFamily:'var(--mono)', fontSize:16, marginTop:2, fontVariantNumeric:'tabular-nums' }}>{s.value}</div>
          </div>
        ))}
      </div>
      <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>Monthly history · 2026</div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(12, 1fr)', gap:4 }}>
        {monthly.map(m => {
          const amt = m.entry?.amount || 0;
          const status = m.entry?.status || 'unpaid';
          const sc = STATUS_COLORS[status];
          const h = max > 0 ? (amt/max)*60 : 0;
          const projected = m.entry?.projected;
          return (
            <div key={m.key} style={{ display:'flex', flexDirection:'column', alignItems:'stretch', gap:4 }}>
              <div style={{ height:60, display:'flex', alignItems:'flex-end' }}>
                {amt > 0 && (
                  <div style={{ width:'100%', height:`${h}px`, background: projected ? 'transparent' : sc.dot, border: projected ? `1px dashed ${sc.dot}` : 'none', borderRadius:'2px 2px 0 0', opacity: projected ? .4 : 1 }}/>
                )}
              </div>
              <div style={{ textAlign:'center', fontSize:9, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>{m.month}</div>
              <div style={{ textAlign:'center', fontFamily:'var(--mono)', fontSize:10, color: amt>0?'var(--fg-dim)':'var(--muted)', fontVariantNumeric:'tabular-nums' }}>
                {amt > 0 ? (amt >= 1000 ? `${(amt/1000).toFixed(1)}k` : Math.round(amt)) : '—'}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddBillModal({ onClose, state }) {
  const [name, setName] = React.useState('');
  const [dueDay, setDueDay] = React.useState(1);
  const [amount, setAmount] = React.useState('');
  const [category, setCategory] = React.useState('Utility');

  const submit = () => {
    if (!name.trim()) return;
    const amt = parseFloat(amount) || 0;
    const history = {};
    for (let m = 1; m <= 12; m++) {
      const key = `2026-${String(m).padStart(2,'0')}`;
      history[key] = { amount: amt, status: m < 5 ? 'paid' : 'unpaid', projected: m > 5 };
    }
    state.addBill({ name: name.trim(), dueDay: Number(dueDay), category, history });
    onClose();
  };
  return (
    <ModalShell onClose={onClose} title="Add bill">
      <FormRow label="Name"><Input value={name} onChange={setName} placeholder="e.g. Spotify"/></FormRow>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <FormRow label="Due day"><Input type="number" min={1} max={31} value={dueDay} onChange={setDueDay}/></FormRow>
        <FormRow label="Expected amount"><Input type="number" step="0.01" value={amount} onChange={setAmount} placeholder="0.00"/></FormRow>
      </div>
      <FormRow label="Category">
        <select value={category} onChange={e=>setCategory(e.target.value)} style={selectStyle}>
          {['Housing','Insurance','Credit','Utility','Subscription','Other'].map(c => <option key={c}>{c}</option>)}
        </select>
      </FormRow>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:14 }}>
        <Btn small onClick={onClose}>Cancel</Btn>
        <Btn small primary onClick={submit}>Add bill</Btn>
      </div>
    </ModalShell>
  );
}

function EditBillModal({ onClose, state, bill, viewMonth }) {
  const [name, setName] = React.useState(bill.name);
  const [dueDay, setDueDay] = React.useState(bill.dueDay);
  const [category, setCategory] = React.useState(bill.category);
  const currentEntry = bill.history[viewMonth] || { amount: 0, status: 'unpaid' };
  const [amount, setAmount] = React.useState(String(currentEntry.amount || ''));
  const known = Object.values(bill.history).filter(e => !e.projected && e.amount > 0);
  const avg = known.length ? known.reduce((s,e)=>s+e.amount,0)/known.length : 0;
  const [expected, setExpected] = React.useState(String(avg ? avg.toFixed(2) : ''));

  const submit = () => {
    if (!name.trim()) return;
    state.updateBill(bill.id, { name: name.trim(), dueDay: Number(dueDay), category });
    const amt = parseFloat(amount);
    if (!isNaN(amt)) state.setBillAmount(bill.id, viewMonth, amt);
    const exp = parseFloat(expected);
    if (!isNaN(exp)) state.updateBill(bill.id, { expectedAmount: exp });
    onClose();
  };
  const removeAndClose = () => {
    if (confirm(`Delete "${bill.name}"? This removes its entire history.`)) { state.removeBill(bill.id); onClose(); }
  };
  const viewMonthLabel = (() => { const [y,m] = viewMonth.split('-').map(Number); return `${MONTHS[m-1]} ${y}`; })();

  return (
    <ModalShell onClose={onClose} title={`Edit ${bill.name}`}>
      <FormRow label="Name"><Input value={name} onChange={setName}/></FormRow>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <FormRow label="Due day"><Input type="number" min={1} max={31} value={dueDay} onChange={setDueDay}/></FormRow>
        <FormRow label="Category">
          <select value={category} onChange={e=>setCategory(e.target.value)} style={selectStyle}>
            {['Housing','Insurance','Credit','Utility','Subscription','Loan','Other'].map(c => <option key={c}>{c}</option>)}
          </select>
        </FormRow>
      </div>
      <div style={{ height:1, background:'var(--border)', margin:'4px 0' }}/>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <FormRow label={`Amount · ${viewMonthLabel}`}><Input type="number" step="0.01" value={amount} onChange={setAmount}/></FormRow>
        <FormRow label="Expected (future months)"><Input type="number" step="0.01" value={expected} onChange={setExpected}/></FormRow>
      </div>
      <div style={{ fontSize:11, color:'var(--muted)', marginTop:-4 }}>Expected updates future projected months only. Past months keep their actuals.</div>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', gap:8, marginTop:14 }}>
        <button onClick={removeAndClose} style={{ appearance:'none', border:'1px solid var(--border)', background:'transparent', color:'#f87171', padding:'6px 11px', borderRadius:7, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>Delete bill</button>
        <div style={{ display:'flex', gap:8 }}>
          <Btn small onClick={onClose}>Cancel</Btn>
          <Btn small primary onClick={submit}>Save changes</Btn>
        </div>
      </div>
    </ModalShell>
  );
}

// ── calendar view ─────────────────────────────────────────────────────────────

function CalendarView({ state, hidePaid }) {
  const [viewYear, setViewYear] = React.useState(TODAY.getFullYear());
  const [viewMonthIdx, setViewMonthIdx] = React.useState(TODAY.getMonth());
  const mk = `${viewYear}-${String(viewMonthIdx+1).padStart(2,'0')}`;

  const firstDay = new Date(viewYear, viewMonthIdx, 1);
  const daysInMonth = new Date(viewYear, viewMonthIdx+1, 0).getDate();
  const startOffset = firstDay.getDay();
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

  const billsByDay = {};
  state.bills.forEach(b => {
    const e = b.history[mk];
    if (!e || e.amount <= 0) return;
    if (hidePaid && e.status === 'paid') return;
    (billsByDay[b.dueDay] = billsByDay[b.dueDay] || []).push({ bill: b, entry: e });
  });

  const monthTotal = Object.values(billsByDay).flat().reduce((s,x)=>s+x.entry.amount,0);
  const monthPaid  = Object.values(billsByDay).flat().filter(x=>x.entry.status==='paid').reduce((s,x)=>s+x.entry.amount,0);
  const todayIsThisMonth = TODAY.getFullYear() === viewYear && TODAY.getMonth() === viewMonthIdx;

  const goPrev = () => { if (viewMonthIdx === 0) { setViewYear(y=>y-1); setViewMonthIdx(11); } else setViewMonthIdx(m=>m-1); };
  const goNext = () => { if (viewMonthIdx === 11) { setViewYear(y=>y+1); setViewMonthIdx(0); } else setViewMonthIdx(m=>m+1); };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ display:'flex', gap:4 }}>
            <Btn small onClick={goPrev}>‹</Btn>
            <Btn small onClick={goNext}>›</Btn>
          </div>
          <h2 style={{ margin:0, fontSize:17, fontWeight:600, letterSpacing:'-.015em' }}>
            {firstDay.toLocaleString('en-US',{month:'long'})} <span style={{ color:'var(--muted)', fontWeight:400 }}>{viewYear}</span>
          </h2>
          <Btn small onClick={()=>{ setViewYear(TODAY.getFullYear()); setViewMonthIdx(TODAY.getMonth()); }}>Today</Btn>
        </div>
        <div style={{ fontSize:12, color:'var(--muted)' }}>
          <span style={{ fontFamily:'var(--mono)', color:'var(--fg)' }}>{fmtMoney(monthPaid)}</span> of <span style={{ fontFamily:'var(--mono)' }}>{fmtMoney(monthTotal)}</span> paid
        </div>
      </div>

      <Card padded={false}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', borderBottom:'1px solid var(--border)' }}>
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
            <div key={d} style={{ padding:'10px 12px', fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.08em', fontWeight:500, borderRight:'1px solid var(--border)' }}>{d}</div>
          ))}
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gridAutoRows:'minmax(110px, 1fr)' }}>
          {Array.from({ length: totalCells }).map((_, i) => {
            const dayNum = i - startOffset + 1;
            const inMonth = dayNum >= 1 && dayNum <= daysInMonth;
            const isToday = todayIsThisMonth && dayNum === TODAY.getDate();
            const isPast = todayIsThisMonth && dayNum < TODAY.getDate();
            const items = inMonth ? (billsByDay[dayNum] || []) : [];
            const dayTotal = items.reduce((s,x)=>s+x.entry.amount,0);
            return (
              <div key={i} style={{ borderRight:'1px solid var(--border)', borderTop:'1px solid var(--border)', background: !inMonth?'rgba(0,0,0,.15)':isToday?'rgba(var(--accent-rgb),.06)':'transparent', padding:8, display:'flex', flexDirection:'column', gap:4, minHeight:0, overflow:'hidden' }}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                  <div style={{ fontFamily:'var(--mono)', fontSize:11, color: !inMonth?'transparent':isToday?'var(--accent)':isPast?'var(--muted)':'var(--fg-dim)', fontWeight: isToday?600:400, width:20, height:20, borderRadius:10, display:'inline-flex', alignItems:'center', justifyContent:'center', background: isToday?'rgba(var(--accent-rgb),.18)':'transparent', fontVariantNumeric:'tabular-nums' }}>
                    {inMonth ? dayNum : ''}
                  </div>
                  {dayTotal > 0 && (
                    <div style={{ fontSize:10, color:'var(--muted)', fontFamily:'var(--mono)', fontVariantNumeric:'tabular-nums' }}>{fmtMoney(dayTotal,{compact:true})}</div>
                  )}
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:3, overflow:'hidden' }}>
                  {items.map((it, k) => <CalendarBillChip key={k} item={it} state={state} monthKey={mk}/>)}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      <div style={{ display:'flex', gap:14, alignItems:'center', fontSize:11, color:'var(--muted)' }}>
        {[['#22c55e','Paid'],['#f59e0b','Processing'],['#ef4444','Unpaid']].map(([color,label]) => (
          <span key={label} style={{ display:'inline-flex', alignItems:'center', gap:5 }}>
            <span style={{ width:7, height:7, borderRadius:999, background:color }}/>{label}
          </span>
        ))}
        <div style={{ marginLeft:'auto' }}>Click a chip to cycle status</div>
      </div>
    </div>
  );
}

function CalendarBillChip({ item, state, monthKey }) {
  const sc = STATUS_COLORS[item.entry.status];
  const cycle = () => {
    const order = ['unpaid','processing','paid'];
    const next = order[(order.indexOf(item.entry.status)+1) % 3];
    state.setBillStatus(item.bill.id, monthKey, next);
  };
  return (
    <button onClick={cycle} style={{ appearance:'none', textAlign:'left', border:0, background:sc.bg, color:sc.fg, borderLeft:`2px solid ${sc.dot}`, padding:'3px 6px', borderRadius:'3px 4px 4px 3px', fontSize:10.5, fontFamily:'inherit', cursor:'pointer', lineHeight:1.25, display:'flex', justifyContent:'space-between', alignItems:'center', gap:4 }}>
      <span style={{ whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', flex:1, fontWeight:500 }}>{item.bill.name}</span>
      <span style={{ fontFamily:'var(--mono)', fontSize:9.5, opacity:.85, fontVariantNumeric:'tabular-nums' }}>
        {item.entry.amount >= 1000 ? `${(item.entry.amount/1000).toFixed(1)}k` : Math.round(item.entry.amount)}
      </span>
    </button>
  );
}

// ── debt view ─────────────────────────────────────────────────────────────────

function DebtView({ state }) {
  const { debts } = state;
  const [openId, setOpenId] = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);

  const totalDebt = debts.reduce((s,d)=>s+d.balance, 0);
  const totalMin  = debts.reduce((s,d)=>s+(d.minPayment||0), 0);

  const allDates = new Set();
  debts.forEach(d => (d.history||[]).forEach(h => allDates.add(h.date)));
  const sortedDates = [...allDates].sort();
  const aggregateSeries = sortedDates.map(date => {
    let total = 0;
    debts.forEach(d => {
      const past = (d.history||[]).filter(h => h.date <= date);
      if (past.length) total += past[past.length-1].balance;
    });
    return { date, total };
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12 }}>
        <Card style={{ padding:16 }}>
          <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Total debt</div>
          <div style={{ fontFamily:'var(--mono)', fontSize:26, marginTop:4, letterSpacing:'-.015em', fontVariantNumeric:'tabular-nums' }}>{fmtMoney(totalDebt)}</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginTop:4 }}>{debts.length} accounts</div>
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Min. payments / month</div>
          <div style={{ fontFamily:'var(--mono)', fontSize:26, marginTop:4, letterSpacing:'-.015em', fontVariantNumeric:'tabular-nums' }}>{fmtMoney(totalMin)}</div>
          <div style={{ fontSize:11, color:'var(--muted)', marginTop:4 }}>Combined minimum</div>
        </Card>
        <Card style={{ padding:16 }}>
          <div style={{ fontSize:11, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em', marginBottom:6 }}>Balance trend</div>
          <DebtAggregateChart series={aggregateSeries}/>
        </Card>
      </div>

      <div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
          <SectionTitle hint={`${debts.length} accounts`}>Accounts</SectionTitle>
          <Btn small onClick={()=>setShowAdd(true)}>+ Add debt</Btn>
        </div>
        <Card padded={false}>
          {debts.length === 0 && (
            <div style={{ padding:40, textAlign:'center', color:'var(--muted)', fontSize:12.5 }}>No debts tracked yet. Click "+ Add debt" to start.</div>
          )}
          {debts.map((d, idx) => {
            const hist = d.history || [];
            const oldest = hist[0]?.balance || d.balance;
            const change = d.balance - oldest;
            const pct = totalDebt ? (d.balance/totalDebt)*100 : 0;
            const expanded = openId === d.id;
            return (
              <div key={d.id} style={{ borderTop: idx > 0 ? '1px solid var(--border)' : 'none' }}>
                <div style={{ display:'grid', gridTemplateColumns:'1.5fr 1fr 110px 110px 120px 70px', alignItems:'center', gap:12, padding:'12px 16px', cursor:'pointer', background: expanded?'var(--hover)':'transparent' }}
                  onClick={() => setOpenId(expanded ? null : d.id)}
                  onMouseEnter={e=>{ if(!expanded) e.currentTarget.style.background='var(--hover-soft)'; }}
                  onMouseLeave={e=>{ if(!expanded) e.currentTarget.style.background='transparent'; }}>
                  <div>
                    <div style={{ fontSize:13, fontWeight:500 }}><CategoryDot category={d.category}/>{d.name}</div>
                    <div style={{ fontSize:11, color:'var(--muted)', marginTop:1 }}>{d.category}</div>
                  </div>
                  <div>
                    <div style={{ height:4, background:'var(--border)', borderRadius:2, overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${pct}%`, background:'var(--accent)' }}/>
                    </div>
                    <div style={{ fontSize:10.5, color:'var(--muted)', marginTop:4, fontFamily:'var(--mono)' }}>{pct.toFixed(1)}% of total</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Min/mo</div>
                    <div style={{ fontFamily:'var(--mono)', fontSize:13, marginTop:1, fontVariantNumeric:'tabular-nums' }}>{fmtMoney(d.minPayment||0)}</div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Change</div>
                    <div style={{ fontFamily:'var(--mono)', fontSize:13, marginTop:1, fontVariantNumeric:'tabular-nums', color: change<0?'#4ade80':change>0?'#f87171':'var(--muted)' }}>
                      {change < 0 ? '−' : change > 0 ? '+' : ''}{fmtMoney(Math.abs(change))}
                    </div>
                  </div>
                  <div style={{ textAlign:'right' }}>
                    <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.05em' }}>Balance</div>
                    <div style={{ fontFamily:'var(--mono)', fontSize:15, fontWeight:500, marginTop:1, fontVariantNumeric:'tabular-nums' }}>{fmtMoney(d.balance)}</div>
                  </div>
                  <div style={{ display:'flex', justifyContent:'flex-end', gap:6 }} onClick={e=>e.stopPropagation()}>
                    <IconBtn title="Edit" onClick={()=>setEditingId(d.id)}>
                      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M11 2.5l2.5 2.5L5 13.5H2.5V11L11 2.5z" stroke="currentColor" strokeWidth="1.2" strokeLinejoin="round"/></svg>
                    </IconBtn>
                    <IconBtn title="Delete" danger onClick={()=>{ if(confirm(`Delete "${d.name}"?`)) state.removeDebt(d.id); }}>
                      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3 4.5h10M6.5 4V2.5h3V4M5 4.5l.5 9h5l.5-9M7 7v4M9 7v4" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/></svg>
                    </IconBtn>
                  </div>
                </div>
                {expanded && (
                  <div style={{ padding:'8px 16px 20px', background:'var(--hover)', borderTop:'1px solid var(--border)' }}>
                    <DebtHistoryDetail debt={d} state={state}/>
                  </div>
                )}
              </div>
            );
          })}
        </Card>
      </div>

      {showAdd && <AddDebtModal onClose={()=>setShowAdd(false)} state={state}/>}
      {editingId && <EditDebtModal onClose={()=>setEditingId(null)} state={state} debt={debts.find(d=>d.id===editingId)}/>}
    </div>
  );
}

function DebtAggregateChart({ series }) {
  if (!series || series.length < 2) return <div style={{ fontSize:11, color:'var(--muted)' }}>Not enough history yet.</div>;
  const values = series.map(s=>s.total);
  const first = values[0], last = values[values.length-1];
  const change = last - first;
  const pct = first ? (change/first)*100 : 0;
  return (
    <div>
      <Sparkline values={values} width={220} height={36}/>
      <div style={{ fontSize:11, marginTop:4, color: change<0?'#4ade80':change>0?'#f87171':'var(--muted)' }}>
        {change < 0 ? '↓ ' : change > 0 ? '↑ ' : ''}{fmtMoney(Math.abs(change),{compact:true})} ({pct.toFixed(1)}%) over {series.length} snapshots
      </div>
    </div>
  );
}

function DebtHistoryDetail({ debt }) {
  const history = [...(debt.history || [])].sort((a,b)=>a.date.localeCompare(b.date));
  const values = history.map(h => h.balance);
  return (
    <div style={{ padding:'12px 8px 0' }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1.6fr', gap:24 }}>
        <div>
          <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>Balance history</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6, maxHeight:200, overflowY:'auto' }}>
            {history.length === 0 && <div style={{ fontSize:12, color:'var(--muted)' }}>No history yet.</div>}
            {history.map((h, i) => {
              const prev = i > 0 ? history[i-1].balance : null;
              const delta = prev != null ? h.balance - prev : 0;
              return (
                <div key={i} style={{ display:'grid', gridTemplateColumns:'90px 1fr 80px', alignItems:'center', fontSize:12 }}>
                  <span style={{ color:'var(--muted)', fontFamily:'var(--mono)', fontVariantNumeric:'tabular-nums' }}>{h.date}</span>
                  <span style={{ fontFamily:'var(--mono)', fontVariantNumeric:'tabular-nums' }}>{fmtMoney(h.balance)}</span>
                  <span style={{ fontFamily:'var(--mono)', fontSize:11, textAlign:'right', fontVariantNumeric:'tabular-nums', color: prev==null?'var(--muted)':delta<0?'#4ade80':delta>0?'#f87171':'var(--muted)' }}>
                    {prev != null ? `${delta<0?'−':delta>0?'+':''}${fmtMoney(Math.abs(delta),{compact:true})}` : '—'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
        <div>
          <div style={{ fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'.06em', marginBottom:8 }}>Trend</div>
          {values.length >= 2
            ? <BigChart values={values} dates={history.map(h=>h.date)}/>
            : <div style={{ fontSize:12, color:'var(--muted)' }}>Need at least two snapshots to show a trend.</div>
          }
        </div>
      </div>
    </div>
  );
}

function BigChart({ values, dates }) {
  const W = 380, H = 140, P = 10;
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = (W - P*2) / (values.length - 1);
  const pts = values.map((v, i) => [P + i*stepX, H - P - ((v-min)/range)*(H - P*2)]);
  const path = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const area = path + ` L${W-P},${H-P} L${P},${H-P} Z`;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ maxWidth:420, display:'block' }}>
      {[0,1,2,3].map(i => (
        <line key={i} x1={P} x2={W-P} y1={P+(H-P*2)*i/3} y2={P+(H-P*2)*i/3} stroke="var(--border)" strokeWidth="1"/>
      ))}
      <path d={area} fill="rgba(var(--accent-rgb),.12)"/>
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeLinejoin="round"/>
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={2.5} fill="var(--accent)"/>)}
      <text x={P} y={H-1} fill="var(--muted)" fontSize="9" fontFamily="var(--mono)">{dates[0]}</text>
      <text x={W-P} y={H-1} fill="var(--muted)" fontSize="9" fontFamily="var(--mono)" textAnchor="end">{dates[dates.length-1]}</text>
      <text x={P+2} y={P+9} fill="var(--muted)" fontSize="9" fontFamily="var(--mono)">${(max).toFixed(0)}</text>
      <text x={P+2} y={H-P} fill="var(--muted)" fontSize="9" fontFamily="var(--mono)">${(min).toFixed(0)}</text>
    </svg>
  );
}

function AddDebtModal({ onClose, state }) {
  const [name, setName] = React.useState('');
  const [category, setCategory] = React.useState('Credit Card');
  const [balance, setBalance] = React.useState('');
  const [minPayment, setMinPayment] = React.useState('');
  const submit = () => {
    if (!name.trim()) return;
    state.addDebt({ name: name.trim(), category, balance: parseFloat(balance)||0, minPayment: parseFloat(minPayment)||0 });
    onClose();
  };
  return (
    <ModalShell onClose={onClose} title="Add debt">
      <FormRow label="Account name"><Input value={name} onChange={setName} placeholder="e.g. Discover Card"/></FormRow>
      <FormRow label="Category">
        <select value={category} onChange={e=>setCategory(e.target.value)} style={selectStyle}>
          {['Credit Card','Loan','Taxes','Medical','Other'].map(c => <option key={c}>{c}</option>)}
        </select>
      </FormRow>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <FormRow label="Current balance"><Input type="number" step="0.01" value={balance} onChange={setBalance} placeholder="0.00"/></FormRow>
        <FormRow label="Min payment"><Input type="number" step="0.01" value={minPayment} onChange={setMinPayment} placeholder="0.00"/></FormRow>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:14 }}>
        <Btn small onClick={onClose}>Cancel</Btn>
        <Btn small primary onClick={submit}>Add debt</Btn>
      </div>
    </ModalShell>
  );
}

function EditDebtModal({ onClose, state, debt }) {
  const [name, setName] = React.useState(debt.name);
  const [category, setCategory] = React.useState(debt.category);
  const [balance, setBalance] = React.useState(String(debt.balance));
  const [minPayment, setMinPayment] = React.useState(String(debt.minPayment||''));
  const submit = () => {
    state.updateDebt(debt.id, { name: name.trim()||debt.name, category, balance: parseFloat(balance)||0, minPayment: parseFloat(minPayment)||0 });
    onClose();
  };
  return (
    <ModalShell onClose={onClose} title={`Update ${debt.name}`}>
      <FormRow label="Account name"><Input value={name} onChange={setName}/></FormRow>
      <FormRow label="Category">
        <select value={category} onChange={e=>setCategory(e.target.value)} style={selectStyle}>
          {['Credit Card','Loan','Taxes','Medical','Other'].map(c => <option key={c}>{c}</option>)}
        </select>
      </FormRow>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
        <FormRow label="Current balance"><Input type="number" step="0.01" value={balance} onChange={setBalance}/></FormRow>
        <FormRow label="Min payment"><Input type="number" step="0.01" value={minPayment} onChange={setMinPayment}/></FormRow>
      </div>
      <div style={{ fontSize:11, color:'var(--muted)', marginTop:-4 }}>Changing the balance adds a snapshot dated today.</div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:8, marginTop:14 }}>
        <Btn small onClick={onClose}>Cancel</Btn>
        <Btn small primary onClick={submit}>Save changes</Btn>
      </div>
    </ModalShell>
  );
}

const TWEAK_DEFAULTS = { density: 'regular', hidePaid: false, accent: '#7aa2ff' };
const ACCENT_OPTIONS = ['#7aa2ff', '#9a8cff', '#7ad3a3', '#f5a26b'];

function hexToRgb(hex) {
  const m = hex.replace('#','');
  return [parseInt(m.slice(0,2),16), parseInt(m.slice(2,4),16), parseInt(m.slice(4,6),16)].join(', ');
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const state = useAppState();
  const [view, setView] = React.useState('dashboard');

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-rgb', hexToRgb(t.accent));
  }, [t.accent]);

  if (!state.ready) {
    return (
      <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12 }}>
        <div style={{ width:22, height:22, borderRadius:6, background:'linear-gradient(135deg, var(--accent), rgba(var(--accent-rgb),.5))', display:'flex', alignItems:'center', justifyContent:'center', color:'#0a0a0b', fontWeight:700, fontSize:12, fontFamily:'var(--mono)' }}>P</div>
        <div style={{ color:'var(--muted)', fontFamily:'var(--mono)', fontSize:12, letterSpacing:'.05em' }}>Loading…</div>
      </div>
    );
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
      <header style={{ borderBottom:'1px solid var(--border)', background:'var(--bg)', position:'sticky', top:0, zIndex:30 }}>
        <div style={{ maxWidth:1280, margin:'0 auto', padding:'0 28px', display:'flex', alignItems:'center', height:52, gap:24 }}>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:22, height:22, borderRadius:6, background:'linear-gradient(135deg, var(--accent), rgba(var(--accent-rgb),.5))', display:'flex', alignItems:'center', justifyContent:'center', color:'#0a0a0b', fontWeight:700, fontSize:12, fontFamily:'var(--mono)' }}>P</div>
            <div style={{ fontSize:13, fontWeight:600, letterSpacing:'-.01em' }}>Personal Finance</div>
          </div>
          <nav style={{ display:'flex', gap:2 }}>
            {NAV.map(n => {
              const active = view === n.id;
              return (
                <button key={n.id} onClick={()=>setView(n.id)} style={{ appearance:'none', border:0, background: active?'var(--hover)':'transparent', color: active?'var(--fg)':'var(--muted)', padding:'6px 11px', borderRadius:7, fontSize:12.5, fontWeight:500, fontFamily:'inherit', cursor:'pointer', display:'inline-flex', alignItems:'center', gap:7 }}
                  onMouseEnter={e=>{ if(!active) e.currentTarget.style.background='var(--hover-soft)'; }}
                  onMouseLeave={e=>{ if(!active) e.currentTarget.style.background='transparent'; }}>
                  <span style={{ color: active?'var(--accent)':'var(--muted)' }}>{n.icon}</span>
                  {n.label}
                </button>
              );
            })}
          </nav>
          <div style={{ marginLeft:'auto', fontSize:11.5, color:'var(--muted)', fontFamily:'var(--mono)' }}>
            {TODAY.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' })}
          </div>
        </div>
      </header>

      <main style={{ maxWidth:1280, margin:'0 auto', padding:'20px 28px 48px', width:'100%', boxSizing:'border-box' }}>
        <div style={{ marginBottom:18 }}>
          <h1 style={{ margin:0, fontSize:22, fontWeight:600, letterSpacing:'-.02em' }}>
            {{ dashboard:'Dashboard', bills:'Bills', calendar:'Calendar', debt:'Debt' }[view]}
          </h1>
          <div style={{ fontSize:12.5, color:'var(--muted)', marginTop:4 }}>
            {{ dashboard:`${TODAY.toLocaleString('en-US',{month:'long',year:'numeric'})} · ${state.bills.length} bills tracked · ${state.debts.length} debts`, bills:'Sorted by due date · click a row for monthly history & running totals', calendar:"Bills laid out on the month they're due · click a chip to cycle status", debt:'Track current balances and watch them go down (or up)' }[view]}
          </div>
        </div>

        {view === 'dashboard' && <Dashboard state={state} onNav={setView}/>}
        {view === 'bills'     && <BillsView state={state} density={t.density} hidePaid={t.hidePaid}/>}

      <TweaksPanel>
        <TweakSection label="Display"/>

        <TweakToggle label="Hide paid bills" value={t.hidePaid} onChange={(v)=>setTweak('hidePaid',v)}/>
        <TweakSection label="Theme"/>

      </TweaksPanel>
    </div>
  );
}
